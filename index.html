<!DOCTYPE html>
<html>
<head>
  <title>Video Recorder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    video {
      width: 100%;
      max-width: 350px;
      border-radius: 12px;
      margin-top: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .start { background: #22c55e; color: white; }
    .stop { background: #ef4444; color: white; }

    #status {
      margin-top: 15px;
      font-size: 14px;
    }

    #linkBox {
      margin-top: 15px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h2>🎥 Record Your Video</h2>

<input type="text" id="username" placeholder="Enter your name" />

<video id="preview" autoplay muted playsinline></video>

<br>

<button class="start" onclick="startRecording()">Start</button>
<button class="stop" onclick="stopRecording()">Stop</button>

<p id="status"></p>

<div id="linkBox"></div>

<script>
let mediaRecorder;
let chunks = [];
let stream;

// 🔹 CHANGE THESE
const CLOUD_NAME = "dednueey1";
const UPLOAD_PRESET = "qr_upload";

async function startRecording() {
  const name = document.getElementById("username").value;
  if (!name) {
    alert("Please enter your name");
    return;
  }

  stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("preview").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8",
    videoBitsPerSecond: 500000
  });

  chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = uploadVideo;

  mediaRecorder.start();
  document.getElementById("status").innerText = "🔴 Recording... (Max 2 min)";

  // Auto stop after 2 min
  setTimeout(() => {
    if (mediaRecorder.state === "recording") {
      mediaRecorder.stop();
    }
  }, 120000);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

async function uploadVideo() {
  document.getElementById("status").innerText = "⏳ Uploading...";

  const blob = new Blob(chunks, { type: "video/webm" });

  let formData = new FormData();
  formData.append("file", blob);
  formData.append("upload_preset", UPLOAD_PRESET);

  try {
    let res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    let data = await res.json();

    if (data.secure_url) {
      document.getElementById("status").innerText = "✅ Upload Successful";

      document.getElementById("linkBox").innerHTML = `
        <p>🎉 Your video is uploaded:</p>
        <a href="${data.secure_url}" target="_blank">${data.secure_url}</a>
        <br><br>
        <video controls src="${data.secure_url}"></video>
      `;
    } else {
      throw new Error("Upload failed");
    }

  } catch (err) {
    document.getElementById("status").innerText = "❌ Upload Failed";
    console.error(err);
  }
}
</script>

</body>
</html>
