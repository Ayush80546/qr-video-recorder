<!DOCTYPE html>
<html>
<head>
  <title>Video Recorder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    video {
      width: 100%;
      max-width: 350px;
      border-radius: 12px;
      margin-top: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .start { background: #22c55e; }
    .stop { background: #ef4444; }

    #progressBar {
      width: 100%;
      max-width: 350px;
      height: 10px;
      background: #333;
      border-radius: 10px;
      margin: 10px auto;
      overflow: hidden;
      display: none;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: #22c55e;
    }

    #status { margin-top: 10px; }
    #linkBox { margin-top: 15px; word-break: break-all; }
  </style>
</head>
<body>

<h2>🎥 Record Your Video</h2>

<input type="text" id="username" placeholder="Enter your name" />

<video id="preview" autoplay muted playsinline></video><br>

<button class="start" onclick="startRecording()">Start</button>
<button class="stop" onclick="stopRecording()">Stop</button>

<div id="progressBar"><div id="progress"></div></div>

<p id="status"></p>
<div id="linkBox"></div>

<script>
let mediaRecorder;
let chunks = [];
let stream;
let userLocation = null;

const CLOUD_NAME = "YOUR_CLOUD_NAME";
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

// 📍 Get Location
function getLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject("Geolocation not supported");
    } else {
      navigator.geolocation.getCurrentPosition(
        pos => {
          resolve({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          });
        },
        err => reject(err),
        { enableHighAccuracy: true }
      );
    }
  });
}

async function startRecording() {
  const name = document.getElementById("username").value;

  if (!name) {
    alert("Enter name first");
    return;
  }

  document.getElementById("status").innerText = "📍 Getting location...";

  try {
    userLocation = await getLocation();
  } catch (e) {
    alert("Location permission denied");
    return;
  }

  stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("preview").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8",
    videoBitsPerSecond: 500000
  });

  chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = uploadVideo;

  mediaRecorder.start();

  document.getElementById("status").innerText = "🔴 Recording...";

  setTimeout(() => {
    if (mediaRecorder.state === "recording") {
      mediaRecorder.stop();
    }
  }, 120000);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

function uploadVideo() {
  document.getElementById("status").innerText = "Uploading...";
  document.getElementById("progressBar").style.display = "block";

  const blob = new Blob(chunks, { type: "video/webm" });

  let formData = new FormData();
  formData.append("file", blob);
  formData.append("upload_preset", UPLOAD_PRESET);

  // 📍 Attach location metadata
  if (userLocation) {
    formData.append(
      "context",
      `location=${userLocation.lat},${userLocation.lng}|name=${document.getElementById("username").value}`
    );
  }

  let xhr = new XMLHttpRequest();
  xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      let percent = (e.loaded / e.total) * 100;
      document.getElementById("progress").style.width = percent + "%";
    }
  };

  xhr.onload = function() {
    let data = JSON.parse(xhr.responseText);

    if (data.secure_url) {
      document.getElementById("status").innerText = "✅ Uploaded";

      document.getElementById("linkBox").innerHTML = `
        <p>🎉 Video uploaded:</p>
        <a href="${data.secure_url}" target="_blank">${data.secure_url}</a>
        <br><br>
        <p>📍 Location: ${userLocation.lat}, ${userLocation.lng}</p>
        <video controls src="${data.secure_url}"></video>
      `;
    } else {
      document.getElementById("status").innerText = "❌ Upload failed";
    }
  };

  xhr.onerror = function() {
    document.getElementById("status").innerText = "❌ Upload error";
  };

  xhr.send(formData);
}
</script>

</body>
</html>
